<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taste Skill - Premium SaaS Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: { electric: '#1e3a8a', neutral: '#18181b', offwhite: '#fafafa' }
                }
            }
        }
    </script>
    <style>body { background-color: #fbfbfa; }</style>
</head>
<body class="text-neutral font-sans antialiased min-h-[100dvh] flex flex-col md:flex-row">
    <!-- Asymmetric Layout: Narrow sidebar, huge main area -->
    <aside class="w-full md:w-64 bg-white border-r border-gray-200 p-8 flex flex-col justify-between">
        <div>
            <div class="w-10 h-10 bg-neutral text-white rounded-lg flex items-center justify-center font-bold text-xl mb-12">N</div>
            <nav class="space-y-4">
                <a href="#" class="block text-gray-500 hover:text-neutral hover:translate-x-1 transition-transform">Overview</a>
                <a href="#" class="block text-neutral font-semibold border-l-2 border-electric pl-2">Metrics</a>
                <a href="#" class="block text-gray-500 hover:text-neutral hover:translate-x-1 transition-transform">Settings</a>
            </nav>
        </div>
        <div class="mt-20">
            <button class="w-full bg-neutral text-white py-3 px-4 rounded hover:-translate-y-1 hover:shadow-lg transition-all active:scale-[0.98]">Deploy AI</button>
        </div>
    </aside>
    <main class="flex-1 p-8 md:p-16">
        <header class="mb-16 flex justify-between items-end">
            <h1 class="text-5xl font-extrabold tracking-tighter">System<br><span class="text-electric">Metrics</span></h1>
            <p class="text-gray-400 max-w-xs text-sm">Real-time asynchronous monitoring with Taste Engine ruleset active.</p>
        </header>
        <section class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="md:col-span-2 bg-white p-8 border-t-2 border-electric shadow-[0_20px_40px_-15px_rgba(0,0,0,0.05)] relative overflow-hidden group">
                <h3 class="text-gray-400 text-sm uppercase tracking-widest mb-4">Traffic Volume</h3>
                <div class="text-6xl font-light">48,209<span class="text-electric text-2xl font-bold ml-2">↑ 12%</span></div>
                <!-- Micro-interaction / Hover depth effect -->
                <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-electric/5 rounded-full blur-2xl group-hover:bg-electric/10 transition-colors"></div>
            </div>
            <div class="p-8 border-l border-gray-200">
                <h3 class="text-gray-400 text-sm uppercase tracking-widest mb-4">Server Status</h3>
                <div class="flex items-center gap-3 mb-6">
                    <span class="w-3 h-3 rounded-full bg-emerald-400 animate-pulse"></span>
                    <span class="font-bold">Operational</span>
                </div>
                <div class="h-24 w-full bg-gray-100 rounded flex items-end gap-1 p-2">
                    <div class="bg-neutral w-full h-1/2"></div>
                    <div class="bg-neutral w-full h-full"></div>
                    <div class="bg-neutral w-full h-3/4"></div>
                    <div class="bg-neutral w-full h-1/4"></div>
                    <div class="bg-electric w-full h-5/6"></div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
